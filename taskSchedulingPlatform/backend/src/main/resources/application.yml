server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: task-scheduling-platform

  datasource:
    url: jdbc:mysql://localhost:3306/task_scheduling?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 871502794
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          scheduler:
            instanceName: TaskScheduler
          jobStore:
            class: org.quartz.simpl.RAMJobStore
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 10
            threadPriority: 5

jwt:
  secret: task-scheduling-platform-secret-key-2024
  expiration: 86400000

remote:
  execute:
    url: http://localhost:8081/api/tasks/execute
  logs:
    url: http://localhost:8081/api/tasks/logs

logging:
  level:
    com.task: debug
    org.springframework: info
