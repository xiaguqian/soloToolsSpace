server:
  port: 8080

spring:
  application:
    name: xunfood-backend
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/xunfood?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 871502794
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

xunfood:
  jwt:
    secret: xunfood-secret-key-2024-spring-boot-jwt-token-secret
    expiration: 86400000
  
  ai:
    provider: openai
    models:
      openai:
        api-key: your-openai-api-key
        base-url: https://api.openai.com/v1
        model: gpt-3.5-turbo
      deepseek:
        api-key: your-deepseek-api-key
        base-url: https://api.deepseek.com/v1
        model: deepseek-chat
      qwen:
        api-key: your-qwen-api-key
        base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
        model: qwen-plus
    enabled: true
    timeout: 30000
